name: Build All Platforms
on:
  push:
    branches: [master]
  workflow_dispatch:
env:
  PYTHONIOENCODING: utf-8
jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        tier: [free, personal, professional, astrologer]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography pefile
          pip install -r requirements.txt
      - name: Build tier distributions
        run: python scripts/build.py
      - name: Build Windows exe
        working-directory: builds/stellaris-${{ matrix.tier }}
        run: |
          pyinstaller --onefile --name "Stellaris-13-${{ matrix.tier }}" --console --add-data "templates;templates" --add-data "static;static" --add-data "legal;legal" --add-data "version.json;." --add-data "config.py;." --hidden-import swisseph --hidden-import flask --hidden-import jinja2 --hidden-import markupsafe --hidden-import werkzeug --hidden-import requests --hidden-import cryptography --hidden-import cryptography.fernet --hidden-import markdown --hidden-import docx --exclude-module tkinter --exclude-module matplotlib --exclude-module scipy --exclude-module PIL --collect-all swisseph stellaris_launcher.py
      - uses: actions/upload-artifact@v4
        with:
          name: Stellaris-13-${{ matrix.tier }}-Windows
          path: builds/stellaris-${{ matrix.tier }}/dist/*.exe
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tier: [free, personal, professional, astrologer]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cython setuptools
          pip install -r requirements.txt
      - name: Build tier distributions with compiled modules
        run: python scripts/build.py --compile
      - name: Build Linux binary
        working-directory: builds/stellaris-${{ matrix.tier }}
        run: |
          pyinstaller --onefile --name "Stellaris-13-${{ matrix.tier }}" --console --add-data "templates:templates" --add-data "static:static" --add-data "legal:legal" --add-data "version.json:." --add-data "config.py:." --hidden-import swisseph --hidden-import flask --hidden-import jinja2 --hidden-import markupsafe --hidden-import werkzeug --hidden-import requests --hidden-import cryptography --hidden-import cryptography.fernet --hidden-import markdown --hidden-import docx --exclude-module tkinter --exclude-module matplotlib --exclude-module scipy --exclude-module PIL --collect-all swisseph stellaris_launcher.py
      - uses: actions/upload-artifact@v4
        with:
          name: Stellaris-13-${{ matrix.tier }}-Linux
          path: builds/stellaris-${{ matrix.tier }}/dist/Stellaris-13-*
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        tier: [free, personal, professional, astrologer]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cython setuptools
          pip install -r requirements.txt
      - name: Build tier distributions with compiled modules
        run: python scripts/build.py --compile
      - name: Build Mac binary
        working-directory: builds/stellaris-${{ matrix.tier }}
        run: |
          pyinstaller --onefile --name "Stellaris-13-${{ matrix.tier }}" --console --add-data "templates:templates" --add-data "static:static" --add-data "legal:legal" --add-data "version.json:." --add-data "config.py:." --hidden-import swisseph --hidden-import flask --hidden-import jinja2 --hidden-import markupsafe --hidden-import werkzeug --hidden-import requests --hidden-import cryptography --hidden-import cryptography.fernet --hidden-import markdown --hidden-import docx --exclude-module tkinter --exclude-module matplotlib --exclude-module scipy --exclude-module PIL --collect-all swisseph stellaris_launcher.py
      - uses: actions/upload-artifact@v4
        with:
          name: Stellaris-13-${{ matrix.tier }}-Mac
          path: builds/stellaris-${{ matrix.tier }}/dist/Stellaris-13-*
          retention-days: 30
