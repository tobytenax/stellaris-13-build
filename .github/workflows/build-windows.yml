name: Build Windows Exes

on:
  push:
      branches: [master]
        workflow_dispatch:

        jobs:
          build-windows:
              runs-on: windows-2025
                  strategy:
                        matrix:
                                build_type: [astrologer, free, personal, professional]
                                    steps:
                                          - name: Checkout repository
                                                  uses: actions/checkout@v4
                                                          with:
                                                                    fetch-depth: 1

                                                                          - name: Set up Python
                                                                                  uses: actions/setup-python@v5
                                                                                          with:
                                                                                                    python-version: '3.11'
                                                                                                    
                                                                                                          - name: Install dependencies
                                                                                                                  run: |
                                                                                                                            python -m pip install --upgrade pip
                                                                                                                                      pip install pyinstaller cryptography pefile
                                                                                                                                                pip install -r "stellaris-13-v2.7 (4).3/stellaris-13-v2.4/requirements.txt" || echo "Requirements not found"
                                                                                                                                                
                                                                                                                                                      - name: Run build.py to generate tier distributions
                                                                                                                                                              run: |
                                                                                                                                                                        python scripts/build.py
                                                                                                                                                                        
                                                                                                                                                                              - name: Create Launcher Script
                                                                                                                                                                                      working-directory: builds/stellaris-${{ matrix.build_type }}
                                                                                                                                                                                              run: |
                                                                                                                                                                                                        python -c "
                                                                                                                                                                                                                  code = '''import sys, os, threading, webbrowser, time, signal
                                                                                                                                                                                                                            if getattr(sys, 'frozen', False):
                                                                                                                                                                                                                                          BASE_DIR = sys._MEIPASS
                                                                                                                                                                                                                                                        os.chdir(BASE_DIR)
                                                                                                                                                                                                                                                                      DATA_DIR = os.path.join(os.environ.get('APPDATA', os.path.expanduser('~')), 'Stellaris-13')
                                                                                                                                                                                                                                                                                    os.makedirs(DATA_DIR, exist_ok=True)
                                                                                                                                                                                                                                                                                                  os.environ['STELLARIS_DATA_DIR'] = DATA_DIR
                                                                                                                                                                                                                                                                                                            else:
                                                                                                                                                                                                                                                                                                                          BASE_DIR = os.path.dirname(os.path.abspath(__file__))
                                                                                                                                                                                                                                                                                                                                        os.chdir(BASE_DIR)
                                                                                                                                                                                                                                                                                                                                                  def open_browser():
                                                                                                                                                                                                                                                                                                                                                                time.sleep(3)
                                                                                                                                                                                                                                                                                                                                                                              webbrowser.open('http://localhost:13013')
                                                                                                                                                                                                                                                                                                                                                                                        signal.signal(signal.SIGINT, lambda s,f: sys.exit(0))
                                                                                                                                                                                                                                                                                                                                                                                                  if __name__ == '__main__':
                                                                                                                                                                                                                                                                                                                                                                                                                print()
                                                                                                                                                                                                                                                                                                                                                                                                                              print('  Stellaris-13 is starting...')
                                                                                                                                                                                                                                                                                                                                                                                                                                            print('  Your browser will open automatically...')
                                                                                                                                                                                                                                                                                                                                                                                                                                                          print()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        threading.Thread(target=open_browser, daemon=True).start()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      from app import app
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    app.run(host='127.0.0.1', port=13013, debug=False, use_reloader=False)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              '''
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        with open('stellaris_launcher.py', 'w') as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      f.write(code)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                "
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Build Stellaris-${{ matrix.build_type }} Windows exe
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              working-directory: builds/stellaris-${{ matrix.build_type }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                pyinstaller --onefile --name \"Stellaris-13-${{ matrix.build_type }}\" --console ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            --add-data \"templates;templates\" ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        --add-data \"static;static\" ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    --add-data \"legal;legal\" ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                --add-data \"version.json;.\" ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            --add-data \"config.py;.\" ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        --hidden-import swisseph ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    --hidden-import flask ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                --hidden-import jinja2 ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            --hidden-import markupsafe ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        --hidden-import werkzeug ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    --hidden-import requests ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                --hidden-import cryptography ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            --hidden-import cryptography.fernet ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        --hidden-import markdown ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    --hidden-import docx ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                --exclude-module tkinter ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            --exclude-module matplotlib ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        --exclude-module scipy ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    --exclude-module PIL ^
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                stellaris_launcher.py
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Upload artifact
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                name: Stellaris-13-${{ matrix.build_type }}-Windows
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          path: builds/stellaris-${{ matrix.build_type }}/dist/*.exe
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    retention-days: 30
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
