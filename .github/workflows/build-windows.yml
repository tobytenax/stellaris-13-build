name: Build Windows Exes
on:
  push:
    branches: [master]
  workflow_dispatch:
env:
  PYTHONIOENCODING: utf-8
jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        build_type: [astrologer, free, personal, professional]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography pefile
          pip install -r requirements.txt || pip install -r "stellaris-13-v2.7 (4).3/stellaris-13-v2.4/requirements.txt" || echo "Requirements not found"
      - name: Run build.py to generate tier distributions
        run: |
          python scripts/build.py
      - name: Build Stellaris-${{ matrix.build_type }} Windows exe
        working-directory: builds/stellaris-${{ matrix.build_type }}
        run: |
          pyinstaller --onefile --name "Stellaris-13-${{ matrix.build_type }}" --console --add-data "templates;templates" --add-data "static;static" --add-data "legal;legal" --add-data "version.json;." --add-data "config.py;." --hidden-import swisseph --hidden-import flask --hidden-import jinja2 --hidden-import markupsafe --hidden-import werkzeug --hidden-import requests --hidden-import cryptography --hidden-import cryptography.fernet --hidden-import markdown --hidden-import docx --exclude-module tkinter --exclude-module matplotlib --exclude-module scipy --exclude-module PIL stellaris_launcher.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stellaris-13-${{ matrix.build_type }}-Windows
          path: builds/stellaris-${{ matrix.build_type }}/dist/*.exe
          retention-days: 30
